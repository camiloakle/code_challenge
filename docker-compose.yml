# Dashboard (Streamlit) + Airflow (LocalExecutor + Postgres)
#
#   export AIRFLOW_UID=$(id -u)   # Linux — permisos en volúmenes
#   docker compose up -d --build
#
#   Dashboard:  http://localhost:8501
#   Airflow UI: http://localhost:8080  (admin / admin — solo dev)

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/Dockerfile.airflow
  image: billups-airflow:2.11.2-local
  # Dev convenience: if AIRFLOW_UID is not exported, run as root to avoid
  # permission issues writing under the bind-mounted repo (e.g. data/bronze).
  # Recommended on Linux: export AIRFLOW_UID=$(id -u)
  user: "${AIRFLOW_UID:-0}:0"
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
  volumes:
    - ./:/opt/project
    - airflow_logs:/opt/airflow/logs
  working_dir: /opt/airflow

services:
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      PYTHONPATH: /app
    command: >
      streamlit run dashboard/app.py
      --server.address=0.0.0.0
      --server.port=8501

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      retries: 10
      start_period: 5s

  airflow-init:
    <<: *airflow-common
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        set -e
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com \
          || true

  airflow-webserver:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    command: webserver
    ports:
      - "8080:8080"

  airflow-scheduler:
    <<: *airflow-common
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    command: scheduler

volumes:
  postgres_data:
  airflow_logs:
